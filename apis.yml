aid: cradle-bio
name: Cradle
description: >-
  Cradle is a Dutch–Swiss biotechnology software company founded in 2021
  with headquarters in Amsterdam and an office in Zurich, building an
  AI-powered protein engineering platform for industrial biotech and
  biopharma R&D teams. The platform combines proprietary generative AI
  models — trained on billions of natural protein sequences and on data
  produced in Cradle's own Amsterdam wet lab — with a web application and
  REST API/Python SDK so that scientists can design, simulate, and
  co-optimize amino-acid sequence variants across multiple measurable
  properties such as activity, binding affinity, stability, expression,
  and developability. Core platform capabilities include AI candidate
  generation, multi-property co-optimization, virtual plate design,
  experimental data management with full versioning and audit trails,
  task orchestration (analyze data, diversify, engineer, select, search,
  train) across modalities including antibodies/mAbs, enzymes, vaccines,
  therapeutic peptides, and food ingredients, plus a Custom Predictors
  framework letting customers plug in their own ML models. Cradle is sold
  as enterprise SaaS to R&D organizations — disclosed customers and
  partners include Johnson & Johnson Janssen, Bayer, Novozymes/Novonesis,
  and Twist Bioscience, with the platform serving six of the top 25
  global pharma companies and over 50 active R&D programs. The company
  has raised approximately $115M to date across a seed round (Index
  Ventures, 2022), a $24M Series A (Index Ventures, 2023), and a $73M
  Series B (IVP, 2024). Co-founders are Stef van Grieken (CEO), Jelle
  Prins, Elise de Reus, Eli Bixby, and Harmen van Rossum.
