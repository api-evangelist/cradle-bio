    description: >-
      The Cradle Platform API is an enterprise REST API for programmatic
      access to Cradle's AI-driven protein engineering platform. It is
      organized under per-workspace v2 endpoints and exposes resource
      groups for Workspaces, Projects, Rounds, Data Management, Tables,
      Data Loads (file upload/download with finalize, undo, and redo),
      Artifacts, Tasks, Audit Logs, and Custom Predictors. Task creation
      endpoints (analyze-data/v2, diversify/v2, engineer/v2, select/v2,
      search/v2, train/v2) drive Cradle's core generative protein
      workflows — sequence diversification, multi-property
      co-optimization, candidate selection, similarity search, and
      model fine-tuning — and return artifacts that can be inspected,
      pulled into custom pipelines, or chained into downstream lab
      automation. The API is paired with an official Python SDK
      (`cradle-sdk` on PyPI) and a Custom Predictor framework that lets
      customers register internally developed models against the same
      orchestration surface used by the Cradle web application. Access
      is enterprise-gated (no public self-serve tier); authentication
      and SSO are handled at the workspace level with SOC 2 controls,
      and the spec is rendered as ReDoc-based reference rather than
      published as a downloadable OpenAPI file.
